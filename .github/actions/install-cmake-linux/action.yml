name: Install cmake linux
runs:
  using: composite
  steps:
    - name: Install cmake linux
      shell: bash
      run: |
        CMAKE_VERSION=3.28.3
        # Download prebuilt binary instead of building from source
        sudo rm -rf /opt/cmake /opt/cmake-${CMAKE_VERSION}-linux-x86_64
        curl -fsSL "https://github.com/Kitware/CMake/releases/download/v${CMAKE_VERSION}/cmake-${CMAKE_VERSION}-linux-x86_64.tar.gz" | sudo tar xz -C /opt
        # Remove target again in case it was recreated, then move
        sudo rm -rf /opt/cmake
        sudo mv "/opt/cmake-${CMAKE_VERSION}-linux-x86_64" /opt/cmake || {
          sudo cp -a "/opt/cmake-${CMAKE_VERSION}-linux-x86_64/." /opt/cmake/
        }
        echo "/opt/cmake/bin" >> $GITHUB_PATH
