name: Setup ccache for Windows
description: 'Install and configure ccache with smart caching for Windows builds'

inputs:
  cache-suffix:
    description: 'Suffix for cache key (e.g., cuda-12.6)'
    required: false
    default: ''
  cache-family:
    description: 'Broad cache family prefix for cross-variant sharing (e.g., x86_64 for CPU, cuda-12.9 for CUDA). When set, enables fallback to any cache within the same family, so helper/extension variants share a common base.'
    required: false
    default: ''
  max-size:
    description: 'Maximum cache size (e.g., 5G)'
    required: false
    default: '8G'

outputs:
  cache-hit:
    description: 'Whether there was a cache hit'
    value: ${{ steps.ccache-restore.outputs.cache-hit }}
  save-key:
    description: 'Unique cache key used when saving ccache at end of job'
    value: ${{ steps.ccache-keys.outputs.save-key }}

runs:
  using: composite
  steps:
    - name: Install ccache
      continue-on-error: true
      shell: cmd
      run: |
        echo Installing ccache for Windows...
        cd /d %USERPROFILE%
        REM Remove any 0-byte leftover zip from a previous failed download
        if exist ccache-4.10.2-windows-x86_64.zip (
          for %%F in (ccache-4.10.2-windows-x86_64.zip) do (
            if %%~zF==0 del ccache-4.10.2-windows-x86_64.zip
          )
        )
        if not exist ccache-4.10.2-windows-x86_64.zip (
          curl -fLO https://github.com/ccache/ccache/releases/download/v4.10.2/ccache-4.10.2-windows-x86_64.zip
          if errorlevel 1 (
            echo WARNING: ccache download failed
            del ccache-4.10.2-windows-x86_64.zip 2>nul
          )
        )
        if not exist ccache (
          if exist ccache-4.10.2-windows-x86_64.zip (
            mkdir ccache
            tar -xf ccache-4.10.2-windows-x86_64.zip -C ccache --strip-components=1
          )
        )
        if exist ccache\ccache.exe (
          echo ccache installed successfully
        ) else (
          echo WARNING: ccache installation failed, builds will proceed without ccache
        )

    - name: Compute ccache keys
      id: ccache-keys
      shell: pwsh
      run: |
        # Strip trailing dashes from suffix (empty helper/extension produces "x86_64--")
        $suffix = "${{ inputs.cache-suffix }}" -replace '-+$', ''
        $restoreKey = "ccache-windows-${{ runner.arch }}-${suffix}-${{ github.ref_name }}"
        $saveKey = "$restoreKey-${{ github.run_id }}-${{ github.run_attempt }}"
        Add-Content -Path $env:GITHUB_OUTPUT -Value "restore-key=$restoreKey"
        Add-Content -Path $env:GITHUB_OUTPUT -Value "save-key=$saveKey"

    - name: Compute restore keys
      id: ccache-restore-keys
      shell: bash
      run: |
        PREFIX="ccache-windows-${{ runner.arch }}"
        # Strip trailing dashes from suffix
        SUFFIX=$(echo "${{ inputs.cache-suffix }}" | sed 's/-*$//')
        {
          echo "keys<<RESTORE_KEYS_EOF"
          echo "${PREFIX}-${SUFFIX}-${{ github.ref_name }}-"
          echo "${PREFIX}-${SUFFIX}-master-"
          echo "${PREFIX}-${SUFFIX}-main-"
          echo "${PREFIX}-${SUFFIX}-"
          FAMILY="${{ inputs.cache-family }}"
          if [ -n "$FAMILY" ] && [ "$FAMILY" != "$SUFFIX" ]; then
            echo "${PREFIX}-${FAMILY}-${{ github.ref_name }}-"
            echo "${PREFIX}-${FAMILY}-master-"
            echo "${PREFIX}-${FAMILY}-"
          fi
          echo "RESTORE_KEYS_EOF"
        } >> "$GITHUB_OUTPUT"

    - name: Restore ccache
      id: ccache-restore
      uses: actions/cache/restore@v4
      with:
        path: ~/.ccache
        key: ${{ steps.ccache-keys.outputs.restore-key }}
        restore-keys: ${{ steps.ccache-restore-keys.outputs.keys }}

    - name: Configure ccache
      continue-on-error: true
      shell: pwsh
      run: |
        $ccacheDir = "$env:USERPROFILE\.ccache"
        if (-not (Test-Path $ccacheDir)) { New-Item -ItemType Directory -Path $ccacheDir -Force | Out-Null }

        $configPath = "$ccacheDir\ccache.conf"
        # Remove any stale config from cache restore before writing fresh one
        if (Test-Path $configPath) { Remove-Item $configPath -Force }

        $config = @"
        max_size = ${{ inputs.max-size }}
        compression = true
        compression_level = 1
        hash_dir = false
        sloppiness = file_macro,include_file_ctime,include_file_mtime,pch_defines,time_macros,file_stat_matches,clang_index_store,locale,random_seed
        compiler_check = content
        inode_cache = false
        file_clone = false
        pch_external_checksum = true
        temporary_dir = $env:TEMP\ccache_tmp
        depend_mode = true
        direct_mode = true
        "@
        # Trim leading whitespace from each line (YAML indentation)
        $config = ($config -split "`n" | ForEach-Object { $_.Trim() } | Where-Object { $_ -ne '' }) -join "`n"
        Set-Content -Path $configPath -Value $config -Encoding ASCII -NoNewline

        Write-Host "=== ccache configuration ==="
        Get-Content $configPath

    - name: Add ccache to PATH
      continue-on-error: true
      shell: pwsh
      run: |
        $ccachePath = "$env:USERPROFILE\ccache"
        $ccacheDir = "$env:USERPROFILE\.ccache"
        $ccacheExe = "$ccachePath\ccache.exe"

        if (Test-Path $ccacheExe) {
          # Add to GITHUB_PATH for subsequent steps
          Add-Content -Path $env:GITHUB_PATH -Value $ccachePath

          # Add to GITHUB_ENV
          # Note: CMAKE_C/CXX_COMPILER_LAUNCHER are NOT set here — CMakeLists.txt
          # controls which compilers use ccache. On CUDA builds, C/CXX caching is
          # disabled to reserve all cache storage for expensive .cu compilations.
          Add-Content -Path $env:GITHUB_ENV -Value "CCACHE_DIR=$ccacheDir"
          Add-Content -Path $env:GITHUB_ENV -Value "CCACHE_COMPILERCHECK=content"
          Add-Content -Path $env:GITHUB_ENV -Value "CCACHE_BASEDIR=$env:GITHUB_WORKSPACE"
          # Disable PCH: CI runners may have different system header mtimes across restores,
          # which invalidates all PCH-based ccache manifest entries.
          Add-Content -Path $env:GITHUB_ENV -Value "SD_DISABLE_PCH=1"
          # Temporary: enable logging to diagnose cache hit rate
          Add-Content -Path $env:GITHUB_ENV -Value "CCACHE_LOGFILE=$env:USERPROFILE\ccache-debug.log"
          # Note: CCACHE_COMPILERTYPE is NOT set here — let ccache auto-detect.
          # Setting it to "nvcc" globally breaks GCC/MinGW CPU builds (100%
          # preprocessing failure). CUDA builds set it via CMakeLists.txt only
          # for the CUDA compiler launcher path.

          # Verify ccache is accessible
          & $ccacheExe --version
        } else {
          Write-Host "WARNING: ccache.exe not found at $ccacheExe - skipping ccache setup"
          Write-Host "Build will proceed without ccache (slower but functional)"
        }

    - name: Clean stale ccache locks and verify integrity
      continue-on-error: true
      shell: pwsh
      run: |
        $ccacheExe = "$env:USERPROFILE\ccache\ccache.exe"
        $ccacheDir = "$env:USERPROFILE\.ccache"
        if (Test-Path $ccacheExe) {
          # Remove any stale .lock files left by cancelled builds
          Get-ChildItem -Path $ccacheDir -Filter "*.lock" -Recurse -ErrorAction SilentlyContinue |
            ForEach-Object { Remove-Item $_.FullName -Force -ErrorAction SilentlyContinue; Write-Host "Removed stale lock: $($_.Name)" }
          # Run cleanup to remove broken cache entries
          & $ccacheExe --cleanup 2>$null
          # Zero stats for this build
          & $ccacheExe -z 2>$null
        }

    - name: Show ccache stats before build
      continue-on-error: true
      shell: cmd
      run: |
        echo === ccache stats before build ===
        %USERPROFILE%\ccache\ccache.exe -sv
