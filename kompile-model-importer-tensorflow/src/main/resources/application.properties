# TensorFlow Model Importer Application Properties
spring.application.name=tensorflow-model-importer
server.port=8081

# Logging configuration
logging.level.ai.kompile.model.importer.tensorflow=INFO
logging.level.org.eclipse.deeplearning4j=WARN
logging.level.org.bytedeco=WARN

# Multipart file configuration
spring.servlet.multipart.max-file-size=500MB
spring.servlet.multipart.max-request-size=500MB

# Actuator endpoints
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized

# Application info
info.app.name=TensorFlow Model Importer
info.app.description=REST API and CLI tool for importing TensorFlow models to SameDiff format
info.app.version=1.0.0
