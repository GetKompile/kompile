# =============================================================================
# Vespa VectorStore Default Configuration
# =============================================================================
# These are the default settings for the Vespa VectorStore implementation.
# Override these in your application.properties or application.yml as needed.
#
# IMPORTANT: Vespa requires a running server - it is not embedded.
# You must have a Vespa instance running (Docker or Vespa Cloud) with
# an appropriate schema deployed before using this vector store.
# =============================================================================

# Enable Vespa VectorStore (disabled by default)
kompile.vectorstore.vespa.enabled=false

# Vespa endpoint (query and feed)
kompile.vectorstore.vespa.endpoint=http://localhost:8080

# Document organization
kompile.vectorstore.vespa.namespace=default
kompile.vectorstore.vespa.document-type=document
kompile.vectorstore.vespa.content-cluster=content

# Field names (must match your Vespa schema)
kompile.vectorstore.vespa.vector-field=embedding
kompile.vectorstore.vespa.content-field=content
kompile.vectorstore.vespa.metadata-field=metadata

# Vector configuration
kompile.vectorstore.vespa.dimensions=768
kompile.vectorstore.vespa.distance-metric=angular

# Search configuration
kompile.vectorstore.vespa.target-hits=100
kompile.vectorstore.vespa.hnsw-explore-additional-hits=200

# Connection settings
kompile.vectorstore.vespa.connection.connection-timeout-ms=5000
kompile.vectorstore.vespa.connection.request-timeout-ms=30000
kompile.vectorstore.vespa.connection.max-connections=8
kompile.vectorstore.vespa.connection.max-retries=3

# Batch feeding
kompile.vectorstore.vespa.batch.max-documents-per-batch=100
kompile.vectorstore.vespa.batch.max-concurrent-operations=4
kompile.vectorstore.vespa.batch.async-feeding=true

# Hybrid search (disabled by default)
kompile.vectorstore.vespa.hybrid-search.enabled=false
kompile.vectorstore.vespa.hybrid-search.vector-weight=0.7
kompile.vectorstore.vespa.hybrid-search.ranking-profile=hybrid
