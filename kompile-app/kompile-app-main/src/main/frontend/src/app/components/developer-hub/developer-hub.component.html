<div class="developer-hub-container">
  <!-- Developer Hub Header -->
  <div class="developer-hub-header">
    <div class="header-left">
      <mat-icon class="header-icon">code</mat-icon>
      <div>
        <h2>Developer Tools</h2>
        <p class="header-subtitle">Debug, test, configure, and monitor system components</p>
      </div>
    </div>
  </div>

  <mat-tab-group [(selectedIndex)]="selectedTabIndex" (selectedTabChange)="onTabChange($event)">
    <!-- Testers Section -->
    <mat-tab>
      <ng-template mat-tab-label>
        <mat-icon class="tab-icon">science</mat-icon>
        Testers
      </ng-template>
      <div class="tab-content section-content">
        <mat-tab-group class="inner-tabs">
          <mat-tab label="RAG Tester">
            <ng-template matTabContent>
              <div class="inner-tab-content">
                <app-rag-tester></app-rag-tester>
              </div>
            </ng-template>
          </mat-tab>
          <mat-tab label="Contextual RAG">
            <ng-template matTabContent>
              <div class="inner-tab-content">
                <app-contextual-rag-debug></app-contextual-rag-debug>
              </div>
            </ng-template>
          </mat-tab>
          <mat-tab label="Chunking & Loading Test">
            <ng-template matTabContent>
              <div class="inner-tab-content">
                <app-chunking-loader-test></app-chunking-loader-test>
              </div>
            </ng-template>
          </mat-tab>
          <mat-tab label="Passthrough Chat">
            <ng-template matTabContent>
              <div class="inner-tab-content">
                <app-passthrough-chat></app-passthrough-chat>
              </div>
            </ng-template>
          </mat-tab>
        </mat-tab-group>
      </div>
    </mat-tab>

    <!-- Debuggers Section -->
    <mat-tab>
      <ng-template mat-tab-label>
        <mat-icon class="tab-icon">bug_report</mat-icon>
        Debuggers
      </ng-template>
      <div class="tab-content section-content">
        <mat-tab-group class="inner-tabs">
          <mat-tab label="OCR Debug">
            <ng-template matTabContent>
              <div class="inner-tab-content">
                <app-ocr-debug></app-ocr-debug>
              </div>
            </ng-template>
          </mat-tab>
          <mat-tab label="VLM Test">
            <ng-template matTabContent>
              <div class="inner-tab-content">
                <app-vlm-test-workflow></app-vlm-test-workflow>
              </div>
            </ng-template>
          </mat-tab>
          <mat-tab label="Eval Debugger">
            <ng-template matTabContent>
              <div class="inner-tab-content">
                <app-eval-debugger></app-eval-debugger>
              </div>
            </ng-template>
          </mat-tab>
          <mat-tab label="Evaluation Sets">
            <ng-template matTabContent>
              <div class="inner-tab-content">
                <app-managed-eval></app-managed-eval>
              </div>
            </ng-template>
          </mat-tab>
          <mat-tab label="Experiments">
            <ng-template matTabContent>
              <div class="inner-tab-content">
                <app-experiments></app-experiments>
              </div>
            </ng-template>
          </mat-tab>
        </mat-tab-group>
      </div>
    </mat-tab>

    <!-- Management Section -->
    <mat-tab>
      <ng-template mat-tab-label>
        <mat-icon class="tab-icon">settings</mat-icon>
        Management
      </ng-template>
      <div class="tab-content section-content">
        <mat-tab-group class="inner-tabs">
          <mat-tab label="Ingest History">
            <ng-template matTabContent>
              <div class="inner-tab-content">
                <app-ingest-history></app-ingest-history>
              </div>
            </ng-template>
          </mat-tab>
          <mat-tab label="Resumable Jobs">
            <ng-template matTabContent>
              <div class="inner-tab-content">
                <app-job-resume></app-job-resume>
              </div>
            </ng-template>
          </mat-tab>
          <mat-tab label="Processing Settings">
            <ng-template matTabContent>
              <div class="inner-tab-content">
                <app-processing-settings></app-processing-settings>
              </div>
            </ng-template>
          </mat-tab>
          <mat-tab label="Subprocess Config">
            <ng-template matTabContent>
              <div class="inner-tab-content">
                <app-subprocess-config></app-subprocess-config>
              </div>
            </ng-template>
          </mat-tab>
          <mat-tab label="Model & Staging">
            <ng-template matTabContent>
              <div class="inner-tab-content">
                <app-model-staging></app-model-staging>
              </div>
            </ng-template>
          </mat-tab>
          <mat-tab label="VLM Management">
            <ng-template matTabContent>
              <div class="inner-tab-content">
                <app-vlm-management></app-vlm-management>
              </div>
            </ng-template>
          </mat-tab>
          <mat-tab label="GPU Management">
            <ng-template matTabContent>
              <div class="inner-tab-content">
                <app-gpu-management></app-gpu-management>
              </div>
            </ng-template>
          </mat-tab>
          <mat-tab label="Job Scheduler">
            <ng-template matTabContent>
              <div class="inner-tab-content">
                <app-scheduler-dashboard></app-scheduler-dashboard>
              </div>
            </ng-template>
          </mat-tab>
          <mat-tab label="Model Admission">
            <ng-template matTabContent>
              <div class="inner-tab-content">
                <app-model-admission></app-model-admission>
              </div>
            </ng-template>
          </mat-tab>
          <mat-tab label="Pipeline Schedules">
            <ng-template matTabContent>
              <div class="inner-tab-content">
                <app-pipeline-schedules></app-pipeline-schedules>
              </div>
            </ng-template>
          </mat-tab>
          <mat-tab label="Monitors">
            <ng-template matTabContent>
              <div class="inner-tab-content">
                <app-monitors-manager></app-monitors-manager>
              </div>
            </ng-template>
          </mat-tab>
          <mat-tab label="Enforcer">
            <ng-template matTabContent>
              <div class="inner-tab-content">
                <app-enforcer-dashboard></app-enforcer-dashboard>
              </div>
            </ng-template>
          </mat-tab>
          <mat-tab label="Project Judge">
            <ng-template matTabContent>
              <div class="inner-tab-content">
                <app-project-enforcer-manager></app-project-enforcer-manager>
              </div>
            </ng-template>
          </mat-tab>
          <mat-tab label="Training History">
            <ng-template matTabContent>
              <div class="inner-tab-content">
                <app-training-history></app-training-history>
              </div>
            </ng-template>
          </mat-tab>
          <mat-tab label="Model Warmup &amp; Cache">
            <ng-template matTabContent>
              <div class="inner-tab-content">
                <app-model-warmup-cache></app-model-warmup-cache>
              </div>
            </ng-template>
          </mat-tab>
        </mat-tab-group>
      </div>
    </mat-tab>

    <!-- SDX SDK Section -->
    <mat-tab>
      <ng-template mat-tab-label>
        <mat-icon class="tab-icon">developer_board</mat-icon>
        SDX SDK
      </ng-template>
      <div class="tab-content section-content">
        <app-sdk-hub></app-sdk-hub>
      </div>
    </mat-tab>

    <!-- System Section -->
    <mat-tab>
      <ng-template mat-tab-label>
        <mat-icon class="tab-icon">memory</mat-icon>
        System
      </ng-template>
      <div class="tab-content section-content">
        <mat-tab-group class="inner-tabs" #systemInnerTabs>
          <mat-tab label="ND4J Environment">
            <ng-template matTabContent>
              <div class="inner-tab-content">
                <app-nd4j-environment></app-nd4j-environment>
              </div>
            </ng-template>
          </mat-tab>
          <mat-tab label="ND4J Framework">
            <ng-template matTabContent>
              <div class="inner-tab-content">
                <app-nd4j-framework></app-nd4j-framework>
              </div>
            </ng-template>
          </mat-tab>
          <mat-tab label="Op Timing">
            <ng-template matTabContent>
              <div class="inner-tab-content">
                <app-op-timing></app-op-timing>
              </div>
            </ng-template>
          </mat-tab>
          <mat-tab label="Benchmark Runner">
            <ng-template matTabContent>
              <div class="inner-tab-content">
                <app-benchmark-runner></app-benchmark-runner>
              </div>
            </ng-template>
          </mat-tab>
          <mat-tab label="System Diagnostics">
            <ng-template matTabContent>
              <div class="inner-tab-content">
                <app-system-diagnostics></app-system-diagnostics>
              </div>
            </ng-template>
          </mat-tab>
          <mat-tab label="KV Cache">
            <ng-template matTabContent>
              <div class="inner-tab-content">
                <app-kvcache-dashboard></app-kvcache-dashboard>
              </div>
            </ng-template>
          </mat-tab>
          <mat-tab label="Tool Permissions">
            <ng-template matTabContent>
              <div class="inner-tab-content">
                <app-tool-permissions></app-tool-permissions>
              </div>
            </ng-template>
          </mat-tab>
          <mat-tab label="Model Scheduler">
            <ng-template matTabContent>
              <div class="inner-tab-content">
                <app-model-scheduler-panel></app-model-scheduler-panel>
              </div>
            </ng-template>
          </mat-tab>
          <mat-tab label="Memory &amp; Watchdog">
            <ng-template matTabContent>
              <div class="inner-tab-content">
                <app-memory-watchdog></app-memory-watchdog>
              </div>
            </ng-template>
          </mat-tab>
          <mat-tab label="NDArray Lifecycle">
            <ng-template matTabContent>
              <div class="inner-tab-content">
                <app-lifecycle-tracking></app-lifecycle-tracking>
              </div>
            </ng-template>
          </mat-tab>
          <mat-tab label="Auto Configure">
            <ng-template matTabContent>
              <div class="inner-tab-content">
                <app-auto-configure></app-auto-configure>
              </div>
            </ng-template>
          </mat-tab>
        </mat-tab-group>
      </div>
    </mat-tab>
  </mat-tab-group>
</div>
