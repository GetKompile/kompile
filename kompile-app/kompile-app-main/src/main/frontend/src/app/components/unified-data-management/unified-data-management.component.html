<div class="unified-data-management-container">
  <mat-tab-group #tabGroup (selectedIndexChange)="onTabChange($event)" [selectedIndex]="selectedTabIndex"
    animationDuration="200ms" class="unified-tabs">

    <mat-tab>
      <ng-template mat-tab-label>
        <mat-icon class="tab-icon">library_books</mat-icon>
        Fact Sheets
      </ng-template>
      <ng-template matTabContent>
        <div class="tab-content">
          <app-fact-sheet-manager></app-fact-sheet-manager>
        </div>
      </ng-template>
    </mat-tab>

    <mat-tab>
      <ng-template mat-tab-label>
        <mat-icon class="tab-icon">search</mat-icon>
        Index Browser
      </ng-template>
      <ng-template matTabContent>
        <div class="tab-content">
          <app-index-browser></app-index-browser>
        </div>
      </ng-template>
    </mat-tab>

    <mat-tab>
      <ng-template mat-tab-label>
        <mat-icon class="tab-icon">settings</mat-icon>
        Settings
      </ng-template>
      <ng-template matTabContent>
        <div class="tab-content">
          <app-settings></app-settings>
        </div>
      </ng-template>
    </mat-tab>

  </mat-tab-group>
</div>
