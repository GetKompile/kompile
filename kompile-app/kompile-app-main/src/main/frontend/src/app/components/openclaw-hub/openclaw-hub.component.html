<div class="openclaw-hub">
  <!-- Header -->
  <mat-card class="header-card">
    <mat-card-header>
      <mat-card-title>
        <mat-icon>smart_toy</mat-icon>
        OpenClaw Agent Hub
      </mat-card-title>
      <mat-card-subtitle>
        Personal AI Assistant Platform
      </mat-card-subtitle>
    </mat-card-header>
    
    <!-- Stats Row -->
    <mat-card-content>
      <div class="stats-row">
        <div class="stat-card">
          <mat-icon>psychology</mat-icon>
          <div class="stat-content">
            <span class="stat-value">{{ stats.totalAgents }}</span>
            <span class="stat-label">Agents</span>
          </div>
        </div>
        <div class="stat-card">
          <mat-icon>forum</mat-icon>
          <div class="stat-content">
            <span class="stat-value">{{ stats.activeChannels }}</span>
            <span class="stat-label">Active Channels</span>
          </div>
        </div>
        <div class="stat-card">
          <mat-icon>schedule</mat-icon>
          <div class="stat-content">
            <span class="stat-value">{{ stats.scheduledHeartbeats }}</span>
            <span class="stat-label">Heartbeats</span>
          </div>
        </div>
        <div class="stat-card">
          <mat-icon>history</mat-icon>
          <div class="stat-content">
            <span class="stat-value">{{ stats.totalSessions }}</span>
            <span class="stat-label">Sessions</span>
          </div>
        </div>
      </div>
    </mat-card-content>
  </mat-card>

  <!-- Tab Navigation -->
  <mat-tab-group [(selectedIndex)]="activeTabIndex" class="main-tabs">
    <mat-tab label="Agents">
      <app-openclaw-agent-manager></app-openclaw-agent-manager>
    </mat-tab>
    
    <mat-tab label="Channels">
      <app-openclaw-channel-manager></app-openclaw-channel-manager>
    </mat-tab>
    
    <mat-tab label="Chat">
      <app-openclaw-chat></app-openclaw-chat>
    </mat-tab>
    
    <mat-tab label="Sessions">
      <app-openclaw-session-viewer></app-openclaw-session-viewer>
    </mat-tab>
    
    <mat-tab label="Heartbeats">
      <app-openclaw-heartbeat-manager></app-openclaw-heartbeat-manager>
    </mat-tab>
    
    <mat-tab label="Permissions">
      <app-openclaw-permission-manager></app-openclaw-permission-manager>
    </mat-tab>
  </mat-tab-group>
</div>
