<div class="app-container">
  <header>
    <h1>{{ title }}</h1>
  </header>

  <nav>
    <button (click)="activeTab = 'unifiedChat'" [class.active]="activeTab === 'unifiedChat'">Chat</button>
    <button (click)="activeTab = 'search'" [class.active]="activeTab === 'search'">Search</button>
    <button (click)="activeTab = 'mcp'" [class.active]="activeTab === 'mcp'">MCP</button>
    <button (click)="activeTab = 'orchestrator'" [class.active]="activeTab === 'orchestrator'">Orchestrator</button>
    <button (click)="activeTab = 'modelDebug'" [class.active]="activeTab === 'modelDebug'">Model Debug</button>
    <button (click)="activeTab = 'batchConfig'" [class.active]="activeTab === 'batchConfig'">Batch Config</button>
    <button (click)="activeTab = 'subprocessConfig'" [class.active]="activeTab === 'subprocessConfig'">Subprocess</button>
  </nav>

  <main>
    <div *ngIf="activeTab === 'unifiedChat'">
      <app-unified-chat></app-unified-chat>
    </div>
    <div *ngIf="activeTab === 'search'">
      <app-unified-data-management></app-unified-data-management>
    </div>
    <div *ngIf="activeTab === 'mcp'">
      <app-mcp-hub></app-mcp-hub>
    </div>
    <div *ngIf="activeTab === 'orchestrator'">
      <app-orchestrator-hub></app-orchestrator-hub>
    </div>
    <div *ngIf="activeTab === 'modelDebug'">
      <app-model-debug></app-model-debug>
    </div>
    <div *ngIf="activeTab === 'batchConfig'">
      <app-batch-size-config></app-batch-size-config>
    </div>
    <div *ngIf="activeTab === 'subprocessConfig'">
      <app-subprocess-config></app-subprocess-config>
    </div>
  </main>

  <footer>
    <p>{{ title }}</p>
  </footer>
</div>
