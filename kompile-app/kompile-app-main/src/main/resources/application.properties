# MCP SSE Server Configuration (Spring AI)
# Enable the MCP SSE server (default: true)
spring.ai.mcp.server.enabled=true
# Server name for MCP protocol identification
spring.ai.mcp.server.name=kompile-mcp-server
# Server version
spring.ai.mcp.server.version=1.0.0
# Server type: SYNC or ASYNC
spring.ai.mcp.server.type=SYNC
# SSE endpoint path for client connections
spring.ai.mcp.server.sse-endpoint=/sse
# Message endpoint for client requests
spring.ai.mcp.server.sse-message-endpoint=/mcp/message
# Keep-alive interval for SSE connections (optional, set to enable heartbeat)
# spring.ai.mcp.server.keep-alive-interval=30s

# Custom MCP SSE Server (Advanced Features)
# Enable the custom MCP server with Streamable HTTP (2025-03-26) support
mcp.server.enabled=true
# Server name (used in server info)
mcp.server.name=kompile-mcp-server
# Server version
mcp.server.version=1.0.0
# Transport type: sse or stdio
mcp.server.transport=sse
# SSE endpoint path (provides /mcp/sse for both GET and POST)
mcp.server.sse.endpoint=/mcp/sse
# Message endpoint path (for SSE transport POST messages)
mcp.server.sse.message-endpoint=/mcp/message
# SSE connection timeout in milliseconds (5 minutes)
mcp.server.sse.timeout=300000
# Action logging configuration
mcp.server.action-log.enabled=true
mcp.server.action-log.max-entries=1000
mcp.server.action-log.retention-hours=24

# Spring MVC / Web Configuration (For Debugging 404s)
# Default static resource handling is usually sufficient.
# spring.web.resources.add-mappings=true
# spring.web.resources.static-locations=classpath:/META-INF/resources/,classpath:/resources/,classpath:/static/,classpath:/public/
# server.error.whitelabel.enabled=true

# Lifecycle Leak Report Cleanup Configuration
# Automatically cleans up old leak report files to prevent disk space issues
kompile.lifecycle.cleanup.enabled=true
kompile.lifecycle.cleanup.directory=./leak_reports
kompile.lifecycle.cleanup.max-age-days=7
kompile.lifecycle.cleanup.max-files=100
kompile.lifecycle.cleanup.cron=0 0 2 * * ?

# =============================================================================
# BACKUP SERVICE CONFIGURATION
# =============================================================================
# Periodic backup of H2 databases and Lucene indexes

# Enable backup service (default: true)
kompile.backup.enabled=true

# Base path for backup storage
kompile.backup.backup-path=${user.home}/.kompile/backups

# Backup interval in milliseconds (default: 6 hours = 21600000)
kompile.backup.fixed-rate-ms=21600000

# Initial delay before first backup in milliseconds (default: 1 minute)
kompile.backup.initial-delay-ms=60000

# Retention period in days (default: 7)
kompile.backup.retention-days=7

# Backup format: COMPRESSED (tar.gz) or DIRECTORY (plain copy)
kompile.backup.format=COMPRESSED

# Include H2 databases in backup
kompile.backup.include-database=true

# Include Lucene indexes in backup
kompile.backup.include-indexes=true

# Database paths (auto-detected from existing config, override if needed)
kompile.backup.orchestrator-db-path=./data/orchestrator-db
kompile.backup.chat-history-db-path=./data/chat-history

# Index paths (defaults only - actual paths come from UI config app-index-config.json)
kompile.backup.vector-index-path=${user.home}/.kompile/anserini-vector-index
kompile.backup.text-index-path=${user.home}/.kompile/anserini-keyword-index

# Document Ingest Processing Configuration
# Maximum number of concurrent document ingest jobs
kompile.ingest.max-concurrent-jobs=4

# =============================================================================
# BATCH SIZE OPTIMIZATION
# =============================================================================
# PERFORMANCE: Number of chunks to process per batch during embedding/indexing.
# Larger batches = fewer index operations = faster throughput.
# - For 500 chunks, batch-size=100 means 5 index calls vs 50 with batch-size=10
# - Each batch also reduces WebSocket progress update frequency
# - Memory usage increases with batch size; use adaptive-batch-size for auto-tuning
# OPTIMIZED: Increased from 50 to 100 for 2x throughput on systems with 8GB+ RAM
kompile.ingest.index-batch-size=100
# Minimum batch size (used when adaptive batch sizing reduces the size)
kompile.ingest.min-batch-size=25
# Maximum batch size limit (higher values improve throughput but increase memory usage)
# OPTIMIZED: Increased from 200 to 500 for systems with 16GB+ RAM
kompile.ingest.max-batch-size=500

# =============================================================================
# ADAPTIVE EMBEDDING BATCH CONFIGURATION
# =============================================================================
# Target batch size for embedding operations.
# This is the ideal batch size under normal memory conditions.
# Larger batches = fewer model calls = better GPU/model utilization.
# OPTIMIZED: 64 is a good balance for most embedding models (BGE, Arctic, etc.)
kompile.ingest.embedding-target-batch-size=64

# Maximum time (ms) to wait for batch accumulation.
# If this time is exceeded, process whatever chunks are available.
# Higher values = larger batches but higher latency for small uploads.
kompile.ingest.embedding-max-wait-ms=500

# Minimum time (ms) to wait before checking queue again.
# Prevents busy-waiting while allowing responsive batch collection.
kompile.ingest.embedding-min-wait-ms=25

# =============================================================================
# MEMORY MANAGEMENT
# =============================================================================
# Memory usage threshold (%) - new jobs will queue when exceeded (0 to disable)
kompile.ingest.memory-threshold-percent=80
# Critical memory threshold (%) - processing pauses when exceeded
kompile.ingest.memory-critical-percent=90
# Enable automatic batch size adjustment based on available memory
kompile.ingest.adaptive-batch-size=true

# GPU/CUDA Memory Monitoring (for CUDA backend only)
# These thresholds are more conservative than heap since CUDA OOM is unrecoverable
kompile.memory.gpu-threshold-percent=75
kompile.memory.gpu-critical-percent=85
kompile.memory.gpu-kill-threshold-percent=92

# =============================================================================
# THREAD POOL CONFIGURATION
# =============================================================================
# Thread pool core size for async processing (embedding workers)
# OPTIMIZED: Increased from 4 to match typical CPU core count / 2
kompile.ingest.core-pool-size=4
# Thread pool maximum size for async processing
# OPTIMIZED: Increased from 8 to 12 for better parallelism on modern CPUs
kompile.ingest.max-pool-size=12
# Queue capacity for pending ingest jobs
kompile.ingest.queue-capacity=100

# =============================================================================
# KNOWLEDGE GRAPH / ENTITY EXTRACTION CONFIGURATION
# =============================================================================
# Entity and relationship extraction during document indexing.
# When enabled, extracted entities are stored in the knowledge graph.

# Enable automatic entity/relationship extraction during indexing (default: false)
# When true, documents are analyzed by LLM to extract named entities and relationships.
kompile.graph.extraction.enabled=false

# Batch size for entity extraction (default: 10)
# Smaller batches = more LLM calls, better memory usage
# Larger batches = fewer LLM calls, faster processing
kompile.graph.extraction.batch-size=10

# Schema enforcement mode for entity extraction
# NONE: Accept all entity/relationship types from LLM
# LENIENT: Warn about unknown types but allow them
# STRICT: Only accept entity/relationship types defined in schema
kompile.graph.extraction.schema-enforcement=LENIENT

# Entity types to extract (comma-separated, or empty for all)
# Examples: PERSON, ORGANIZATION, LOCATION, CONCEPT, EVENT, PRODUCT
kompile.graph.extraction.entity-types=

# Relationship types to extract (comma-separated, or empty for all)
# Examples: WORKS_AT, LOCATED_IN, RELATED_TO, PART_OF, CREATED_BY
kompile.graph.extraction.relationship-types=

# Maximum entities per chunk (default: 20)
# Limits the number of entities extracted from a single chunk
kompile.graph.extraction.max-entities-per-chunk=20

# Maximum relationships per chunk (default: 30)
# Limits the number of relationships extracted from a single chunk
kompile.graph.extraction.max-relationships-per-chunk=30

# Enable entity deduplication across documents (default: true)
# When enabled, entities with similar titles/types are merged
kompile.graph.deduplication.enabled=true

# Similarity threshold for entity deduplication (0.0-1.0, default: 0.85)
# Higher values = stricter matching = fewer merges
kompile.graph.deduplication.similarity-threshold=0.85

# Neo4j Configuration (for graph storage)
# Enable Neo4j graph store (default: false)
kompile.graph.neo4j.enabled=${NEO4J_ENABLED:false}

# Neo4j connection URI
kompile.graph.neo4j.uri=${NEO4J_URI:bolt://localhost:7687}

# Neo4j authentication
kompile.graph.neo4j.username=${NEO4J_USERNAME:neo4j}
kompile.graph.neo4j.password=${NEO4J_PASSWORD:}

# Neo4j database name (default: neo4j)
kompile.graph.neo4j.database=${NEO4J_DATABASE:neo4j}

# =============================================================================
# KNOWLEDGE GRAPH EMBEDDINGS & GRAPHRAG CONFIGURATION
# =============================================================================
# KG Embedding (TransE, RotatE) and GraphRAG settings are now GUI-configurable.
# Settings are persisted to: ~/.kompile/config/kg-embedding-config.json
#
# Access via:
#   - REST API: /api/knowledge-graph/embeddings/config
#   - Web UI: Knowledge Graph Embeddings > Settings tab
#
# Defaults:
#   TransE: dim=100, epochs=100, lr=0.01, batch=1024, margin=1.0, negSamples=10
#   RotatE: dim=100, epochs=100, lr=0.001, batch=512, margin=6.0, negSamples=256
#   GraphRAG: enabled=false, kgWeight=0.3, textWeight=0.7, hops=1, topK=5

# =============================================================================
# CHUNKING CONFIGURATION
# =============================================================================
# Default chunk size in characters (~512 tokens for most models)
# Larger chunks = fewer chunks = faster indexing, but less granular retrieval
# RECOMMENDATION: 2000 chars for dense retrieval, 4000 for sparse/keyword search
kompile.ingest.default-chunk-size=2000
# Overlap between chunks in characters (10% of chunk size recommended)
# Higher overlap = better context preservation but more storage/compute
kompile.ingest.default-chunk-overlap=200
# Chunking strategy: table-aware (recommended), boundary-aware, recursive-character, sentence, markdown, token
# table-aware: Preserves table boundaries, keeps tables atomic, chunks text normally
# boundary-aware: Prevents splitting URLs, emails, file paths, and other semantic units (configured via UI)
kompile.ingest.default-chunker=table-aware

# =============================================================================
# TABLE EXTRACTION CONFIGURATION
# =============================================================================
# Enable automatic table extraction from PDFs (default: true)
# Tables are extracted using Tabula-java and converted to markdown format
kompile.loader.pdf.extractTables=true
# Table storage mode: inline, separate, or both (default: both)
# - inline: Tables embedded in document text (single embedding)
# - separate: Each table is a separate searchable document
# - both: Maximum retrieval flexibility (recommended)
kompile.loader.pdf.tableStorage=both
# Table format for output (default: markdown)
kompile.loader.pdf.tableFormat=markdown

# Table summary generation method: heuristic or llm (default: heuristic)
# - heuristic: Fast, uses column headers and row counts
# - llm: Uses configured LLM to generate semantic summaries
kompile.table.summaryMethod=heuristic

# Multi-vector retrieval: use full table content in LLM context (default: true)
# When true, retrieved table chunks include full markdown content, not just summary
kompile.retrieval.useFullTableContent=true

# Chat History Configuration
# Enable chat history feature (default: true)
kompile.chat.history.enabled=true
# Database type: h2 (embedded), postgres, mysql
kompile.chat.history.database-type=h2
# H2 database file path (used when database-type=h2)
kompile.chat.history.h2-database-path=./data/chat-history
# Enable H2 console for debugging (default: false)
kompile.chat.history.h2-console-enabled=false

# Optional: Override with external database (PostgreSQL example)
# kompile.chat.history.jdbc-url=jdbc:postgresql://localhost:5432/kompile_chat
# kompile.chat.history.jdbc-username=kompile
# kompile.chat.history.jdbc-password=password
# kompile.chat.history.jdbc-driver-class-name=org.postgresql.Driver

# MCP Server Builder Configuration
# Directory where MCP server configurations are stored
kompile.mcp.servers.config-dir=./data/mcp-servers

# REST-MCP Bridge Configuration
# Directory where bridge configurations are stored
kompile.mcp.bridges.config-dir=./data/mcp-bridges

# Tool Definitions Configuration
# Directory where custom tool definitions are persisted as JSON files
kompile.tools.definitions.directory=./data/tool-definitions

# Prompt Templates Configuration
# Directory where prompt templates are persisted as JSON files
kompile.prompts.templates.directory=./data/prompt-templates

# MCP SSE Client Configuration (for connecting to external MCP servers)
# Enable the MCP client feature (default: false)
spring.ai.mcp.client.enabled=false
# Connection timeout in milliseconds
spring.ai.mcp.client.timeout=30000
# Example: Configure default external MCP servers (uncomment to use)
# spring.ai.mcp.client.servers[0].name=claude-desktop
# spring.ai.mcp.client.servers[0].url=http://localhost:8081/sse

# =============================================================================
# Document Ingest Event Log Configuration
# =============================================================================
# Tracks all document ingest operations with timing and state transitions.
# Events are stored in H2 database and available via REST API.

# Enable ingest event logging (default: true)
kompile.ingest.eventlog.enabled=true

# Retention period for event logs in days (default: 7)
kompile.ingest.eventlog.retention-days=7

# Maximum number of events to store (default: 100000)
kompile.ingest.eventlog.max-events=100000

# H2 database file path for event storage
# kompile.ingest.eventlog.database-path=${user.home}/.kompile/data/ingest-events

# Optional: Override with external database (PostgreSQL example)
# kompile.ingest.eventlog.jdbc-url=jdbc:postgresql://localhost:5432/kompile_events
# kompile.ingest.eventlog.jdbc-username=kompile
# kompile.ingest.eventlog.jdbc-password=password

# =============================================================================
# JOB LOG CONFIGURATION
# =============================================================================
# Per-job log retention settings for viewing detailed logs in job history.
# Logs are stored in the same H2 database as job history.

# Enable job log capture (default: true)
kompile.ingest.job-log.enabled=true

# Retention period for job logs in days (default: 7)
kompile.ingest.job-log.retention-days=7

# Maximum log entries per job (default: 10000)
# Older entries are trimmed when limit is exceeded
kompile.ingest.job-log.max-entries-per-job=10000

# Maximum total log entries across all jobs (default: 500000)
# When exceeded, logs from oldest jobs are removed first
kompile.ingest.job-log.max-total-entries=500000

# Cron expression for scheduled cleanup (default: 3:30 AM daily)
kompile.ingest.job-log.cleanup-cron=0 30 3 * * ?

# =============================================================================
# ORCHESTRATOR CONFIGURATION
# =============================================================================
# Orchestrator module is always enabled - provides state machine task orchestration
# with workflows, LLM integration, and task execution capabilities.

# JPA/H2 Database Configuration for Orchestrator
spring.datasource.url=jdbc:h2:file:./data/orchestrator-db;DB_CLOSE_ON_EXIT=FALSE;AUTO_RECONNECT=TRUE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
# Use 'none' bytecode provider for GraalVM native image compatibility (no runtime bytecode generation)
spring.jpa.properties.hibernate.bytecode.provider=none

# H2 Console (optional - for debugging)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=false

# =============================================================================
# LARGE DOCUMENT PROCESSING CONFIGURATION
# =============================================================================
# Large documents (determined by size or page count) are processed using streaming
# mode to avoid memory pressure. Pages/sections are loaded one at a time and chunks
# flow directly into the embedding pipeline.

# File size threshold (bytes) above which documents use streaming processing
# Default: 10MB (10485760 bytes). Reduce for memory-constrained systems.
kompile.ingest.large-document-size-threshold=10485760

# Page count threshold above which documents use streaming processing
# Default: 50 pages. Documents with more pages than this will stream.
kompile.ingest.large-document-page-threshold=50

# Enable resume support for large document processing
# When enabled, processing state is checkpointed after each page, allowing
# interrupted jobs to resume from the last successfully processed page.
kompile.ingest.enable-resume-support=true

# Directory for storing processing state files
# Used for resume capability when enable-resume-support=true
kompile.ingest.state-directory=${user.home}/.kompile/state

# =============================================================================
# SUBPROCESS-BASED INGEST CONFIGURATION (CRASH ISOLATION)
# =============================================================================
# Document ingestion runs in an isolated subprocess by default to prevent crashes,
# OOM errors, or native library issues from affecting the main application.
# The subprocess uses the same classpath and communicates via STDOUT JSON + HTTP callbacks.

# Enable subprocess mode (default: true)
# When true, document ingestion runs in a separate JVM process.
# When false, uses in-process mode (previous behavior).
# Set to false for debugging or if subprocess spawning is problematic.
kompile.ingest.subprocess.enabled=true

# Path to Java executable for subprocess (default: java)
# Can be set to a specific JDK path if needed (e.g., /usr/lib/jvm/java-17/bin/java)
kompile.ingest.subprocess.java-path=java

# Maximum heap size for subprocess JVM (default: 4g)
# Adjust based on document size and available system memory.
# Larger documents or batch sizes may require more memory.
kompile.ingest.subprocess.heap-size=4g

# Max native/off-heap memory for JavaCPP in the subprocess (default: heap-size * 2)
# Sets both:
# -Dorg.bytedeco.javacpp.maxbytes
# -Dorg.bytedeco.javacpp.maxphysicalbytes
# Accepts values like "8g", "8192m", or raw bytes; leave blank to auto-calculate.
kompile.ingest.subprocess.offheap-max-bytes=

# Maximum time (minutes) to wait for subprocess completion (default: 60)
# Jobs exceeding this timeout will be forcefully terminated.
# Set higher for very large documents or slow embedding models.
kompile.ingest.subprocess.timeout-minutes=60

# Heartbeat interval in seconds (default: 10)
# Subprocess sends heartbeat messages to indicate liveness.
# Main app detects stuck processes if no heartbeat received within 2x this interval.
kompile.ingest.subprocess.heartbeat-interval-seconds=10

# Stale process detection threshold in seconds (default: 120)
# If no heartbeat or progress is received within this time, subprocess is killed.
kompile.ingest.subprocess.stale-threshold-seconds=120

# HTTP callback base URL (auto-detected by default)
# The subprocess calls back to main app to persist events.
# Only set if auto-detection fails (e.g., behind reverse proxy).
# kompile.ingest.subprocess.callback-base-url=http://localhost:8080

# =============================================================================
# VECTOR POPULATION SUBPROCESS CONFIGURATION
# =============================================================================
# Vector store population (Lucene -> Vector Index) runs in an isolated subprocess
# by default to prevent native crashes from affecting the main application.
# This uses the same pattern as document ingestion subprocess mode.

# Enable subprocess mode for vector population (default: true)
# When true, vector population runs in a separate JVM process.
# When false, uses in-process mode.
kompile.vectorpopulation.subprocess.enabled=true

# Path to Java executable for subprocess (default: java)
kompile.vectorpopulation.subprocess.java-path=java

# Maximum heap size for subprocess JVM (default: 4g)
# Embedding operations may require more memory for large batch sizes.
kompile.vectorpopulation.subprocess.heap-size=4g

# Maximum time (minutes) to wait for subprocess completion (default: 120)
# Vector population can take longer due to embedding millions of documents.
kompile.vectorpopulation.subprocess.timeout-minutes=120

# Heartbeat interval in seconds (default: 10)
kompile.vectorpopulation.subprocess.heartbeat-interval-seconds=10

# Stale process detection threshold in seconds (default: 180)
# Slightly higher than ingest since embedding can be slow for large batches.
kompile.vectorpopulation.subprocess.stale-threshold-seconds=180

# Embedding batch size for vector population (default: 32)
# Larger batches are more efficient but use more memory.
kompile.vectorpopulation.subprocess.embedding-batch-size=32

# Enable parallel indexing workers (default: true)
kompile.vectorpopulation.subprocess.parallel-indexing=true

# Number of parallel indexing workers (default: 4)
kompile.vectorpopulation.subprocess.indexing-workers=4

# =============================================================================
# OAUTH2 CONFIGURATION
# =============================================================================
# Centralized OAuth2 token management for document source providers.
# Tokens are encrypted and stored in the H2 database.

# OAuth Encryption Key (auto-generated if not set)
# Use a strong random key in production. If not set, a key will be auto-generated
# and stored in ${kompile.data.dir}/config/oauth-encryption.key
kompile.oauth.encryption-key=${KOMPILE_OAUTH_KEY:}

# Base URL for OAuth redirect callbacks (auto-detected from request if not set)
# Only set if behind a reverse proxy or using custom domain
# kompile.oauth.redirect-base-url=http://localhost:8080

# Google OAuth Configuration
# Create credentials at: https://console.cloud.google.com
kompile.oauth.google.client-id=${GOOGLE_CLIENT_ID:}
kompile.oauth.google.client-secret=${GOOGLE_CLIENT_SECRET:}
kompile.oauth.google.scopes=https://www.googleapis.com/auth/drive.readonly email profile

# Microsoft OAuth Configuration (Azure AD)
# Create app registration at: https://portal.azure.com
kompile.oauth.microsoft.client-id=${MICROSOFT_CLIENT_ID:}
kompile.oauth.microsoft.client-secret=${MICROSOFT_CLIENT_SECRET:}
kompile.oauth.microsoft.tenant-id=${MICROSOFT_TENANT_ID:common}
kompile.oauth.microsoft.scopes=Files.Read User.Read offline_access

# Atlassian OAuth Configuration (Confluence, Jira)
# Create OAuth 2.0 app at: https://developer.atlassian.com/console/myapps/
kompile.oauth.atlassian.client-id=${ATLASSIAN_CLIENT_ID:}
kompile.oauth.atlassian.client-secret=${ATLASSIAN_CLIENT_SECRET:}
kompile.oauth.atlassian.scopes=read:confluence-content.all read:confluence-space.summary read:jira-work read:jira-user offline_access

# Notion OAuth Configuration
# Create integration at: https://www.notion.so/my-integrations
kompile.oauth.notion.client-id=${NOTION_CLIENT_ID:}
kompile.oauth.notion.client-secret=${NOTION_CLIENT_SECRET:}

# Slack OAuth Configuration
# Create app at: https://api.slack.com/apps
kompile.oauth.slack.client-id=${SLACK_CLIENT_ID:}
kompile.oauth.slack.client-secret=${SLACK_CLIENT_SECRET:}
kompile.oauth.slack.scopes=channels:history channels:read users:read

# =============================================================================
# QUERY TRANSFORMATION CONFIGURATION
# =============================================================================
# Transform queries before retrieval to improve search quality.
# Requires an LLM to be configured (OpenAI, Anthropic, etc.)

# Enable query transformation (default: false)
kompile.query-transform.enabled=false

# Query transformer type: expansion, compressing, hyde, stepback, multi-query
# - expansion: Generate multiple query variants for better recall
# - compressing: Compress follow-up queries with conversation context
# - hyde: Generate hypothetical answer documents for better semantic matching
# - stepback: Generate more abstract/general queries for broader context
# - multi-query: Decompose complex questions into sub-questions
kompile.query-transform.type=expansion

# Include the original query along with transformed queries (default: true)
kompile.query-transform.include-original=true

# Maximum number of generated queries (for expansion, multi-query types)
kompile.query-transform.max-queries=3

# LLM temperature for query generation (0.0-1.0, default: 0.7)
kompile.query-transform.temperature=0.7

# =============================================================================
# GUARDRAILS CONFIGURATION
# =============================================================================
# Input/output validation for safety and content moderation.
# Protects against prompt injection, toxicity, PII leakage, and hallucinations.

# Enable input guardrails (default: false)
kompile.guardrails.input.enabled=false

# Enable output guardrails (default: false)
kompile.guardrails.output.enabled=false

# --- Input Guardrails ---

# Enable prompt injection detection (default: true when input guardrails enabled)
kompile.guardrails.input.prompt-injection.enabled=true
# Confidence threshold for prompt injection detection (0.0-1.0)
kompile.guardrails.input.prompt-injection.threshold=0.7

# Enable toxicity detection (default: false - requires LLM)
kompile.guardrails.input.toxicity.enabled=false
# Categories to check: HATE, HARASSMENT, VIOLENCE, SEXUAL, PROFANITY
kompile.guardrails.input.toxicity.categories=HATE,HARASSMENT,VIOLENCE
# Toxicity threshold (0.0-1.0)
kompile.guardrails.input.toxicity.threshold=0.6

# Enable PII detection (default: true when input guardrails enabled)
kompile.guardrails.input.pii.enabled=true
# PII types to detect: EMAIL, PHONE, SSN, CREDIT_CARD, ADDRESS, NAME
kompile.guardrails.input.pii.types=EMAIL,PHONE,SSN,CREDIT_CARD
# Action for PII: BLOCK, WARN, MODIFY (redact)
kompile.guardrails.input.pii.action=WARN

# Enable topic/off-topic detection (default: false)
kompile.guardrails.input.topic.enabled=false
# Allowed topics (comma-separated, leave empty for any topic)
kompile.guardrails.input.topic.allowed-topics=

# --- Output Guardrails ---

# Enable hallucination detection (default: true when output guardrails enabled)
kompile.guardrails.output.hallucination.enabled=true
# Minimum context grounding score (0.0-1.0)
kompile.guardrails.output.hallucination.threshold=0.7

# Enable format validation (default: false)
kompile.guardrails.output.format.enabled=false
# Expected format: JSON, TEXT, MARKDOWN
kompile.guardrails.output.format.type=TEXT
# Maximum response length in characters (0 = unlimited)
kompile.guardrails.output.format.max-length=0

# Enable relevancy checking (default: false)
kompile.guardrails.output.relevancy.enabled=false
# Minimum relevancy score (0.0-1.0)
kompile.guardrails.output.relevancy.threshold=0.6

# =============================================================================
# RAG EVALUATION CONFIGURATION
# =============================================================================
# Evaluate RAG response quality with multiple metrics.
# Useful for testing, monitoring, and continuous improvement.

# Enable RAG evaluation (default: false)
kompile.evaluation.enabled=false

# Run evaluations asynchronously (default: true)
kompile.evaluation.async=true

# --- Relevancy Evaluator ---
# Measures how relevant the response is to the query
kompile.evaluation.relevancy.enabled=true
kompile.evaluation.relevancy.threshold=0.7

# --- Faithfulness Evaluator ---
# Measures how well the response is grounded in the retrieved context
kompile.evaluation.faithfulness.enabled=true
kompile.evaluation.faithfulness.threshold=0.8

# --- Hallucination Evaluator ---
# Detects claims in the response not supported by context
kompile.evaluation.hallucination.enabled=true
kompile.evaluation.hallucination.threshold=0.8

# --- Context Relevancy Evaluator ---
# Measures how relevant the retrieved documents are to the query
kompile.evaluation.context-relevancy.enabled=true
kompile.evaluation.context-relevancy.threshold=0.6

# --- Answer Correctness Evaluator ---
# Compares response to ground truth (requires ground truth in evaluation context)
kompile.evaluation.answer-correctness.enabled=true
kompile.evaluation.answer-correctness.threshold=0.7
# Weights for correctness scoring
kompile.evaluation.answer-correctness.semantic-weight=0.5
kompile.evaluation.answer-correctness.factual-weight=0.5

# Evaluation report storage
kompile.evaluation.report.storage-path=${user.home}/.kompile/evaluation-reports
kompile.evaluation.report.retention-days=30

# =============================================================================
# KV CACHE MANAGEMENT CONFIGURATION
# =============================================================================
# Wraps DL4J's paged/quantized/tiered KV caches for LLM inference.
# Provides REST API for cache CRUD, statistics, checkpoints, and prefix caching.

# Enable KV cache management (default: false)
kompile.kvcache.enabled=false

# Default cache type: paged, evictable, quantized, mla, per-layer
kompile.kvcache.default-type=paged

# Block size for paged caches (tokens per block)
kompile.kvcache.block-size=64

# Maximum batch size (concurrent sequences)
kompile.kvcache.max-batch-size=8

# Maximum sequence length
kompile.kvcache.max-seq-len=4096

# Number of KV heads
kompile.kvcache.num-kv-heads=32

# Head dimension
kompile.kvcache.head-dim=128

# Data type: FLOAT, HALF, BFLOAT16
kompile.kvcache.data-type=FLOAT

# Pool size factor (multiplier for block pool allocation)
kompile.kvcache.pool-size-factor=1.2

# Eviction policy for evictable caches: h2o, streamingllm
kompile.kvcache.eviction-policy=h2o

# Token budget for evictable caches
kompile.kvcache.token-budget=2048

# Quantization format for quantized caches: INT8, FP8_E4M3, FP8_E5M2, INT4
kompile.kvcache.quant-format=INT8

# Tiered storage (GPU -> Host -> Disk)
kompile.kvcache.tiered-enabled=false
kompile.kvcache.gpu-pressure-threshold=0.10
kompile.kvcache.host-pool-max-blocks=1024
kompile.kvcache.disk-offload-path=${user.home}/.kompile/kvcache/disk

# Prefix cache for cross-request prefix sharing
kompile.kvcache.prefix-cache-enabled=false
kompile.kvcache.prefix-cache-max-entries=1024

# Checkpoint management
kompile.kvcache.checkpoint-enabled=false
kompile.kvcache.max-checkpoints=16
kompile.kvcache.checkpoint-dir=${user.home}/.kompile/kvcache/checkpoints

# Statistics collection window in seconds
kompile.kvcache.stats-window-seconds=300

# Kompile Local Model (staging module) auto-discovery
kompile.staging.url=http://localhost:8090
