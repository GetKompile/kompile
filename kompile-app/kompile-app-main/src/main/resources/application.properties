# Spring Boot Application Properties (with Enhanced Debugging)
server.port=8080
spring.application.name=mcp-anserini-rag-starter

# Application UI Configuration
kompile.app.title=Kompile RAG Console

# ND4J/Kompile Data Directory
# This is where persistent configuration files are stored (batch size config, ND4J environment config, etc.)
kompile.data.dir=${user.home}/.kompile

# ND4J Environment Configuration
# These settings are persisted to ${kompile.data.dir}/config/nd4j-environment-config.json
# and automatically restored on startup. Use REST API to manage:
#   GET  /api/nd4j/environment          - View current configuration
#   POST /api/nd4j/environment          - Update configuration
#   POST /api/nd4j/environment/preset/X - Apply preset (minimal, balanced, detailed, performance)
#   POST /api/nd4j/environment/reset    - Reset to defaults
# Note: Settings changed via REST API are persisted and will be restored on next startup

# Graceful Shutdown Configuration
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s

# HTTP Response Configuration for Large Model Summaries
# Allow large responses for model debugging endpoints (100MB limit)
server.tomcat.max-http-response-header-size=100MB
spring.jackson.serialization.fail-on-empty-beans=false
spring.jackson.serialization.write-dates-as-timestamps=false

# Increase max HTTP post size to handle large model data
server.tomcat.max-http-post-size=100MB
server.tomcat.max-swallow-size=100MB

# Multipart file upload configuration
# Critical: Without these settings, large file uploads will fail with empty response
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=500MB
spring.servlet.multipart.max-request-size=500MB
spring.servlet.multipart.file-size-threshold=10MB
# Use temp directory for large uploads to prevent memory exhaustion
spring.servlet.multipart.location=${java.io.tmpdir}

# Connection and request timeout settings to prevent dropped connections during long processing
# Connection timeout: time waiting for initial connection (10 minutes)
server.tomcat.connection-timeout=600000
# Keep-alive timeout for idle connections between requests
server.tomcat.keep-alive-timeout=120000
# Max time Tomcat waits for request body (important for large file uploads)
# Disabled (-1) means unlimited, allowing very large uploads
server.tomcat.max-http-form-post-size=-1

# Spring MVC async request timeout (30 minutes for long-running document processing)
# This prevents "AsyncRequestTimeoutException" during embedding/indexing
spring.mvc.async.request-timeout=1800000

# Disable the servlet request timeout to allow long-running uploads/processing
# Set to -1 for unlimited, or a high value like 1800000 (30 minutes)
server.servlet.session.timeout=30m

# Server thread pool configuration for handling concurrent requests
server.tomcat.threads.max=200
server.tomcat.threads.min-spare=10
server.tomcat.accept-count=100

# Logging - Enhanced for Debugging HTTP/Web and Startup
logging.level.root=INFO
logging.level.org.springframework.ai=INFO
logging.level.org.springframework.boot=INFO
logging.level.ai.kompile=DEBUG

# DEBUG: Enable detailed logging for document upload debugging
logging.level.ai.kompile.app.web.controllers.DocumentManagementController=DEBUG
logging.level.ai.kompile.app.services.DocumentIngestService=DEBUG
logging.level.ai.kompile.core.indexers=DEBUG
logging.level.ai.kompile.embedding=DEBUG

# DEBUG: Tomcat connector logging for connection issues
logging.level.org.apache.coyote=DEBUG
logging.level.org.apache.tomcat.util.net=INFO

# Spring Web/MVC - Set to TRACE for maximum detail on request handling
logging.level.org.springframework.web=TRACE
logging.level.org.springframework.web.servlet.DispatcherServlet=TRACE
logging.level.org.springframework.web.servlet.mvc.method.annotation.RequestMappingHandlerMapping=TRACE
logging.level.org.springframework.web.servlet.resource.ResourceHttpRequestHandler=TRACE
logging.level.org.springframework.boot.autoconfigure.web.servlet.WebMvcAutoConfiguration=DEBUG
logging.level.org.springframework.boot.autoconfigure.web.servlet.WelcomePageHandlerMapping=TRACE

# Spring Beans - DEBUG to see bean creation and dependencies
logging.level.org.springframework.beans.factory=DEBUG

# Enable display of the full condition evaluation report for auto-configuration
debug=true

# Anserini Configuration (ai.kompile.config.AnseriniProperties)
# Path where the final Anserini/Lucene index will be built and stored.
anserini.indexPath=./data/index
# Path used by DocumentIndexer as the staging directory for intermediate JSON files.
anserini.corpusPath=./data/anserini_corpus_json_staging

# Anserini Embedding Configuration
kompile.embedding.anserini.enabled=true
kompile.embedding.anserini.model-identifier=bge-base-en-v1.5

# Anserini VectorStore Configuration
kompile.vectorstore.anserini.enabled=true
kompile.vectorstore.anserini.index-path=${java.io.tmpdir}/anserini-vector-index-${random.value}
kompile.vectorstore.anserini.similarity-function=COSINE
# PERFORMANCE: RAM buffer for IndexWriter. Higher = fewer flushes = faster indexing.
# Default: 512MB. For systems with 16GB+ RAM, consider 1024MB.
kompile.vectorstore.anserini.memory-buffer-size-mb=512
# HNSW Configuration (for approximate nearest neighbor search)
# PERFORMANCE: Set enabled=false for faster indexing (uses flat index instead)
# Use HNSW only for indices > 100k documents where search speed matters
kompile.vectorstore.anserini.hnsw.enabled=true
# PERFORMANCE: Lower M (8-12) = faster indexing, lower recall
# Higher M (24-32) = slower indexing, better recall. Default: 16
kompile.vectorstore.anserini.hnsw.m=16
# PERFORMANCE: Lower efConstruction (50-100) = faster indexing
# Higher (200-500) = better recall. Default: 100
kompile.vectorstore.anserini.hnsw.ef-construction=100

# Document Ingestion Sources (ai.kompile.config.AppDocumentSourceProperties)
# Comma-separated list of document sources (URLs, file paths, directory paths).
# CRITICAL: Ensure these paths are valid from your application's runtime working directory.
# For testing, use absolute paths if relative paths are problematic.
# Make sure sample.txt and sample.pdf actually exist and have content.
app.document.sources=./data/input_documents/sample.txt,./data/input_documents/sample.pdf
app.document.uploads-path=./data/input_documents/uploads

# Folder Storage Configuration (for organizing chat sessions with files)
# Base path where folder directories and their files are stored
kompile.folders.base-path=./data/folders
# Maximum file size for folder uploads (default: 50MB)
kompile.folders.max-file-size=52428800

# Filesystem Tool MCP Configuration (ai.kompile.config.FilesystemToolProperties)
mcp.filesystem.roots.default.path=./data/shared_files
mcp.filesystem.roots.default.alias=default

