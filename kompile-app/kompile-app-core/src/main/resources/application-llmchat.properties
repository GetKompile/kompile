# Kompile LLMChat Configuration
kompile.llm.chat.enabled=true
kompile.llm.chat.default-system=You are a helpful AI assistant built with Kompile
kompile.llm.chat.auto-configure-memory=true
kompile.llm.chat.auto-configure-rag=true
kompile.llm.chat.rag-max-documents=5

# Example Spring AI Configuration (adapt to your LLM provider)
