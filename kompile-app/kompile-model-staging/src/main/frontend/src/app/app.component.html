<mat-sidenav-container class="app-container">
  <mat-sidenav #sidenav mode="side" opened class="app-sidenav">
    <div class="sidenav-header">
      <mat-icon class="logo-icon">memory</mat-icon>
      <span class="logo-text">Model Staging</span>
    </div>
    <mat-nav-list>
      <a mat-list-item *ngFor="let item of navItems"
         [routerLink]="item.path"
         routerLinkActive="active">
        <mat-icon matListItemIcon>{{ item.icon }}</mat-icon>
        <span matListItemTitle>{{ item.label }}</span>
      </a>
    </mat-nav-list>
    <div class="sidenav-footer">
      <mat-divider></mat-divider>
      <div class="version-info">
        <span>v0.1.0</span>
      </div>
    </div>
  </mat-sidenav>

  <mat-sidenav-content class="main-content">
    <mat-toolbar color="primary" class="app-toolbar">
      <button mat-icon-button (click)="sidenav.toggle()">
        <mat-icon>menu</mat-icon>
      </button>
      <span class="toolbar-title">{{ title }}</span>
      <span class="spacer"></span>
      <button mat-icon-button matTooltip="Health Status">
        <mat-icon>favorite</mat-icon>
      </button>
      <button mat-icon-button matTooltip="Documentation">
        <mat-icon>help_outline</mat-icon>
      </button>
    </mat-toolbar>

    <div class="content-area">
      <router-outlet></router-outlet>
    </div>
  </mat-sidenav-content>
</mat-sidenav-container>
