# Anserini VectorStore Configuration
# Enable the Anserini VectorStore implementation
kompile.vectorstore.anserini.enabled=false

# Index storage path
# Uses temp directory for isolation. The Java code adds a unique suffix.
# Override this property to use a persistent location for production.
kompile.vectorstore.anserini.index-path=${java.io.tmpdir}/anserini-vector-idx

# Memory configuration
kompile.vectorstore.anserini.memory-buffer-size-mb=256.0

# Index optimization
kompile.vectorstore.anserini.use-compound-file=false

# Vector similarity function: COSINE, DOT_PRODUCT, EUCLIDEAN
kompile.vectorstore.anserini.similarity-function=COSINE

# Maximum vector dimensions
kompile.vectorstore.anserini.max-dimensions=4096

# Vector quantization (int8 for storage efficiency)
kompile.vectorstore.anserini.quantize-int8=false

# HNSW (Hierarchical Navigable Small World) configuration
# Enable for better search performance on large datasets
kompile.vectorstore.anserini.hnsw.enabled=false
kompile.vectorstore.anserini.hnsw.m=16
kompile.vectorstore.anserini.hnsw.ef-construction=100

# ═══════════════════════════════════════════════════════════════════════════════
# RERANKING CONFIGURATION
# ═══════════════════════════════════════════════════════════════════════════════

# Enable reranking for search results
kompile.reranker.enabled=false

# Reranker type: rm3, bm25prf, rocchio, score_ties
kompile.reranker.type=rm3

# Common feedback parameters
kompile.reranker.fb-docs=10
kompile.reranker.fb-terms=10

# RM3 parameters
# Weight for original query in interpolation (0.0-1.0)
kompile.reranker.original-query-weight=0.5
kompile.reranker.filter-terms=true
kompile.reranker.output-query=false

# BM25-PRF parameters
kompile.reranker.k1=0.9
kompile.reranker.b=0.4
kompile.reranker.new-term-weight=0.2

# Rocchio parameters
kompile.reranker.alpha=1.0
kompile.reranker.beta=0.75
kompile.reranker.gamma=0.15
kompile.reranker.use-negative=false