# Kompile Lite - Self-Contained Chat + RAG + Graph RAG
spring.application.name=kompile-lite
server.port=8090

# Embedding
kompile.embedding.type=anserini
kompile.embedding.anserini.model=bge-base-en-v1.5

# Vector Store
kompile.vectorstore.type=anserini
kompile.vectorstore.anserini.persistence.enabled=true
kompile.vectorstore.anserini.persistence.index-path=${user.home}/.kompile/lite/index

# Knowledge Graph (matrix-based, auto-activates with VectorStore)
kompile.knowledgegraph.type=matrix

# Models
kompile.models.source-type=HYBRID
kompile.models.cache-dir=${user.home}/.kompile/models

# Chunker
kompile.chunker.type=sentence

# Chat History (embedded H2)
spring.datasource.url=jdbc:h2:file:${user.home}/.kompile/lite/chat-history;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# File upload limits
spring.servlet.multipart.max-file-size=500MB
spring.servlet.multipart.max-request-size=500MB

# Logging
logging.level.ai.kompile=INFO
logging.level.org.springframework=WARN

# ND4J
org.bytedeco.javacpp.nopointergc=true
