# Model Conversion Configuration
# This file defines which models to convert from ONNX to SameDiff format

github_config:
  repository_owner: "GetKompile"
  repository_name: "kompile"
  release_tag: "opennlp"
  base_download_url: "https://github.com/GetKompile/kompile/releases/download/opennlp/"
  access_token_env_var: "GITHUB_TOKEN"

conversion_settings:
  working_directory: "./conversion-workspace"
  cleanup_after_conversion: true
  parallel_conversions: 2
  verify_conversions: true
  generate_checksums: true

models:
  # Dense Encoders
  - model_id: "bge-base-en-v1.5"
    model_type: DENSE_ENCODER
    source_model_url: "https://rgw.cs.uwaterloo.ca/pyserini/data/bge-base-en-v1.5-optimized.onnx"
    source_model_filename: "bge-base-en-v1.5-optimized.onnx"
    target_model_filename: "bge-base-en-v1.5.sd"
    vocab_url: "https://rgw.cs.uwaterloo.ca/pyserini/data/bge-base-en-v1.5-vocab.txt"
    vocab_filename: "bge-base-en-v1.5-vocab.txt"
    conversion_parameters:
      suggest_dynamic_variables: false
      track_variable_changes: false
      dynamic_variables:
        input_ids: [1, 512]
        attention_mask: [1, 512]
        token_type_ids: [1, 512]
    tensor_mapping:
      input_tensor_names:
        - "input_ids"
        - "attention_mask"
        - "token_type_ids"
      output_tensor_names:
        - "last_hidden_state"
    encoder_settings:
      max_sequence_length: 512
      do_lowercase_and_strip_accents: true
      add_special_tokens: true
      normalize_embeddings: true
      instruction_prefix: "Represent this sentence for searching relevant passages: "
    metadata:
      description: "BGE Base English v1.5 - Dense retrieval encoder"
      original_source: "BAAI/bge-base-en-v1.5"

  - model_id: "cosdpr-distil"
    model_type: DENSE_ENCODER
    source_model_url: "https://rgw.cs.uwaterloo.ca/pyserini/data/cosdpr-distil-optimized.onnx"
    source_model_filename: "cosdpr-distil-optimized.onnx"
    target_model_filename: "cosdpr-distil.sd"
    vocab_url: "https://rgw.cs.uwaterloo.ca/pyserini/data/cosdpr-distil-vocab.txt"
    vocab_filename: "cosdpr-distil-vocab.txt"
    conversion_parameters:
      suggest_dynamic_variables: false
      track_variable_changes: false
      dynamic_variables:
        input_ids: [1, 512]
        attention_mask: [1, 512]
        token_type_ids: [1, 512]
    tensor_mapping:
      input_tensor_names:
        - "input_ids"
        - "attention_mask"  
        - "token_type_ids"
      output_tensor_names:
        - "pooler_output"
    encoder_settings:
      max_sequence_length: 512
      do_lowercase_and_strip_accents: true
      add_special_tokens: true
      normalize_embeddings: false
    metadata:
      description: "CosDPR Distil - Dense passage retrieval encoder"
      original_source: "sentence-transformers/cos-dpr-distil"

  - model_id: "arctic-embed-l"
    model_type: DENSE_ENCODER
    source_model_url: "https://rgw.cs.uwaterloo.ca/pyserini/data/arctic-embed-l-official.onnx"
    source_model_filename: "arctic-embed-l-official.onnx"
    target_model_filename: "arctic-embed-l.sd"
    vocab_url: "https://rgw.cs.uwaterloo.ca/pyserini/data/arctic-embed-l-official-vocab.txt"
    vocab_filename: "arctic-embed-l-vocab.txt"
    conversion_parameters:
      suggest_dynamic_variables: false
      track_variable_changes: false
      dynamic_variables:
        input_ids: [1, 512]
        attention_mask: [1, 512]
        token_type_ids: [1, 512]
    tensor_mapping:
      input_tensor_names:
        - "input_ids"
        - "attention_mask"
        - "token_type_ids"
      output_tensor_names:
        - "last_hidden_state"
    encoder_settings:
      max_sequence_length: 512
      do_lowercase_and_strip_accents: true
      add_special_tokens: true
      normalize_embeddings: true
      instruction_prefix: "Represent this sentence for searching relevant passages: "
    metadata:
      description: "Snowflake Arctic Embed Large - Dense retrieval encoder"
      original_source: "snowflake/arctic-embed-l"

  # Sparse Encoders
  - model_id: "splade-pp-ed"
    model_type: SPARSE_ENCODER
    source_model_url: "https://rgw.cs.uwaterloo.ca/pyserini/data/splade-pp-ed-optimized.onnx"
    source_model_filename: "splade-pp-ed-optimized.onnx"
    target_model_filename: "splade-pp-ed.sd"
    vocab_url: "https://rgw.cs.uwaterloo.ca/pyserini/data/wordpiece-vocab.txt"
    vocab_filename: "splade-pp-ed-vocab.txt"
    conversion_parameters:
      suggest_dynamic_variables: false
      track_variable_changes: false
      dynamic_variables:
        input_ids: [1, 256]
        attention_mask: [1, 256]
        token_type_ids: [1, 256]
    tensor_mapping:
      input_tensor_names:
        - "input_ids"
        - "attention_mask"
        - "token_type_ids"
      output_tensor_names:
        - "logits"
    encoder_settings:
      max_sequence_length: 256
      do_lowercase_and_strip_accents: true
      add_special_tokens: true
      weight_range: 10
      quant_range: 256
    metadata:
      description: "SPLADE++ EnsembleDistil - Sparse retrieval encoder"
      original_source: "naver/splade-pp-ed"

  - model_id: "splade-pp-sd"
    model_type: SPARSE_ENCODER
    source_model_url: "https://rgw.cs.uwaterloo.ca/pyserini/data/splade-pp-sd-optimized.onnx"
    source_model_filename: "splade-pp-sd-optimized.onnx"
    target_model_filename: "splade-pp-sd.sd"
    vocab_url: "https://rgw.cs.uwaterloo.ca/pyserini/data/wordpiece-vocab.txt"
    vocab_filename: "splade-pp-sd-vocab.txt"
    conversion_parameters:
      suggest_dynamic_variables: false
      track_variable_changes: false
      dynamic_variables:
        input_ids: [1, 256]
        attention_mask: [1, 256]
        token_type_ids: [1, 256]
    tensor_mapping:
      input_tensor_names:
        - "input_ids"
        - "attention_mask"
        - "token_type_ids"
      output_tensor_names:
        - "logits"
    encoder_settings:
      max_sequence_length: 256
      do_lowercase_and_strip_accents: true
      add_special_tokens: true
      weight_range: 10
      quant_range: 256
    metadata:
      description: "SPLADE++ SelfDistil - Sparse retrieval encoder"
      original_source: "naver/splade-pp-sd"

  - model_id: "unicoil"
    model_type: SPARSE_ENCODER
    source_model_url: "https://rgw.cs.uwaterloo.ca/pyserini/data/unicoil-optimized.onnx"
    source_model_filename: "unicoil-optimized.onnx"
    target_model_filename: "unicoil.sd"
    vocab_url: "https://rgw.cs.uwaterloo.ca/pyserini/data/wordpiece-vocab.txt"
    vocab_filename: "unicoil-vocab.txt"
    conversion_parameters:
      suggest_dynamic_variables: false
      track_variable_changes: false
      dynamic_variables:
        input_ids: [1, 512]
        attention_mask: [1, 512]
        token_type_ids: [1, 512]
    tensor_mapping:
      input_tensor_names:
        - "input_ids"
        - "attention_mask"
        - "token_type_ids"
      output_tensor_names:
        - "logits"
    encoder_settings:
      max_sequence_length: 512
      do_lowercase_and_strip_accents: true
      add_special_tokens: true
      weight_range: 5
      quant_range: 255
    metadata:
      description: "UniCOIL - Universal Contextualized Inverted List sparse encoder"
      original_source: "castorini/unicoil"
