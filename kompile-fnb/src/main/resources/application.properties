# Generated application.properties
# Project: kompile-fnb
# All kompile.* config is now in ~/.kompile/config/*.json

# Logging
logging.level.ai.kompile.cli.main.models=INFO
logging.level.ai.kompile.app=INFO
logging.level.io.anserini=INFO

# =============================================================================
# PROVIDER ENABLEMENT FLAGS
# =============================================================================
# Embedding Providers
spring.ai.openai.embedding.enabled=false
spring.ai.postgresml.embedding.enabled=false
spring.ai.transformers.embedding.enabled=false

# Chat Providers
spring.ai.openai.chat.enabled=false
spring.ai.anthropic.chat.enabled=false
spring.ai.vertex.ai.gemini.chat.enabled=false

# Vector Stores
spring.ai.vectorstore.pgvector.enabled=false
spring.ai.vectorstore.chroma.enabled=false

# =============================================================================
# STRUCTURAL CONFIGURATION
# =============================================================================
spring.application.name=kompile-fnb
server.port=8180

# Application Paths
anserini.indexPath=
anserini.corpusPath=./data/anserini_corpus_json_staging
app.document.sources=./data/input_documents/sample.txt,./data/input_documents/sample.pdf
app.document.uploads-path=./data/input_documents/uploads
mcp.filesystem.roots.default.path=./data/shared_files
mcp.filesystem.roots.default.alias=default
