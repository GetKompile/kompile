# ── Kompile MCP tool visibility hooks ─────────────────────────────
# Auto-generated by kompile init. Shows tool name, params, and timing.

[[hooks.PreToolUse]]
matcher = "mcp__kompile__.*"

[[hooks.PreToolUse.hooks]]
type = "command"
command = "bash -c 'INPUT=$(cat); TN=$(echo \"$INPUT\" | jq -r \".tool_name // \\\"unknown\\\"\"); SHORT=${TN#mcp__kompile__}; PARAMS=$(echo \"$INPUT\" | jq -rc \".tool_input // {}\" | head -c 120); echo \"$(($(date +%s%N)/1000000))\" > /tmp/.kompile_hook_ts_5cb9f0e3; echo >&2 \"[kompile] $SHORT | $PARAMS\"'"
statusMessage = "Running kompile tool..."

[[hooks.PostToolUse]]
matcher = "mcp__kompile__.*"

[[hooks.PostToolUse.hooks]]
type = "command"
command = "bash -c 'INPUT=$(cat); TN=$(echo \"$INPUT\" | jq -r \".tool_name // \\\"unknown\\\"\"); SHORT=${TN#mcp__kompile__}; END=$(($(date +%s%N)/1000000)); START=$(cat /tmp/.kompile_hook_ts_5cb9f0e3 2>/dev/null || echo $END); MS=$((END - START)); if [ $MS -gt 1000 ]; then FMT=\"$((MS/1000)).$((MS%1000/100))s\"; else FMT=\"${MS}ms\"; fi; echo >&2 \"[kompile] $SHORT done ($FMT)\"'"
