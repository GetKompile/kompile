# ═══════════════════════════════════════════════════════════════════
# E2E Test Configuration
# ═══════════════════════════════════════════════════════════════════

# Random port to avoid conflicts
server.port=0

# H2 in-memory database
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop

# Allow bean definition overriding for test stubs
spring.main.allow-bean-definition-overriding=true

# Subprocess configuration: always JVM mode in tests
kompile.subprocess.executable.mode=jvm

# Disable auto-download of models in tests
kompile.model.auto-download=false

# Disable heavy optional components
kompile.embedding.type=none
kompile.vectorstore.type=none
kompile.kvcache.enabled=false

# Chunking defaults for test
kompile.chunking.default-strategy=recursive-character
kompile.chunking.default-options=chunkSize:500,overlap:50

# Disable guardrails LLM calls by default
kompile.guardrails.enabled=false
kompile.evaluation.enabled=false
kompile.query-transformer.enabled=false
