# Generated application.properties
# Project: demo
# Generated on: Wed Apr 15 16:04:25 JST 2026
# Configured providers: Anserini Embedding, Anserini Store

# Logging
logging.level.ai.kompile.cli.main.models=INFO
logging.level.ai.kompile.app=INFO
logging.level.io.anserini=INFO

# =============================================================================
# PROVIDER ENABLEMENT FLAGS
# =============================================================================
# Embedding Providers
spring.ai.openai.embedding.enabled=false
spring.ai.transformers.embedding.enabled=false

# Chat Providers
spring.ai.openai.chat.enabled=false
spring.ai.anthropic.chat.enabled=false
spring.ai.vertex.ai.gemini.chat.enabled=false

# Vector Stores
spring.ai.vectorstore.pgvector.enabled=false
spring.ai.vectorstore.chroma.enabled=false

# =============================================================================
# STRUCTURAL CONFIGURATION
# =============================================================================
spring.application.name=demo
server.port=8080
kompile.app.title=Kompile RAG Console

kompile.runtime.model.cache.path=${KOMPILE_MODEL_CACHE_DIR:/home/agibsonccc/.kompile/models}

# OpenNLP Configuration
kompile.opennlp.models.basepath=${kompile.runtime.model.cache.path}/opennlp
kompile.opennlp.sentence.language=en

# Anserini Configuration
kompile.anserini.models.basepath=${kompile.runtime.model.cache.path}/anserini
kompile.embedding.type=anserini
kompile.vectorstore.type=anserini
kompile.embedding.anserini.enabled=true
kompile.embedding.anserini.model-identifier=bge-base-en-v1.5
kompile.staging.url=${KOMPILE_STAGING_URL:http://localhost:8090}
anserini.indexPath=${kompile.anserini.models.basepath}/indexes/keyword_index
kompile.vectorstore.anserini.index-path=${kompile.anserini.models.basepath}/indexes/vector_index
anserini.corpusPath=${kompile.anserini.models.basepath}/corpus/default_corpus

# Chunker (recursive splitter is a sensible default for markdown / mixed text).
kompile.chunker.type=recursive
kompile.chunker.chunkSize=400
kompile.chunker.chunkOverlap=40

# Application Paths
app.document.sources=./data/input_documents/sample.txt,./data/input_documents/sample.pdf
app.document.uploads-path=./data/input_documents/uploads
mcp.filesystem.roots.default.path=./data/shared_files
mcp.filesystem.roots.default.alias=default

# --- Runtime Model Cache Configuration ---
# Default cache path: /home/agibsonccc/.kompile/models
kompile.model.cache.path=${KOMPILE_MODEL_CACHE_DIR:/home/agibsonccc/.kompile/models}

