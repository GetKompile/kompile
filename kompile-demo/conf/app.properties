# Demo override for kompile-app-main.
#
# Pass to spring-boot:run with --spring.config.additional-location=conf/app.properties.
# This points the main app at the demo staging server (port 8090) and uses the bundled
# Anserini vector store so the demo runs with no external services.

server.port=8080

# Point the main app at the demo staging server as its model registry.
kompile.staging.url=http://localhost:8090

# Use the embedded Anserini Lucene HNSW vector store.
kompile.vectorstore.type=anserini

# Use the Anserini SameDiff embeddings (no external API keys required).
kompile.embedding.type=anserini

# Conservative chunking suitable for short markdown demo files.
kompile.chunker.type=recursive
kompile.chunker.chunkSize=400
kompile.chunker.chunkOverlap=40

# Logging
logging.level.ai.kompile=INFO
logging.level.org.nd4j=WARN
logging.level.org.bytedeco=WARN
