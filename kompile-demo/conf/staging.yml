# Demo override for kompile-model-staging.
#
# Pass this to the staging jar with --spring.config.additional-location=conf/staging.yml
# (the demo scripts do this for you). The defaults baked into kompile-model-staging are
# already sensible; this file just makes the demo paths explicit so a user can tweak them.

server:
  port: 8090

spring:
  application:
    name: kompile-model-staging-demo

kompile:
  staging:
    # Where the staging server keeps its model registry on disk.
    model-dir: ${user.home}/.kompile/models
    staging-dir: ${user.home}/.kompile/models/.staging

logging:
  level:
    ai.kompile.staging: INFO
    ai.kompile.staging.conversion.ggml: DEBUG
    org.nd4j: WARN
    org.bytedeco: WARN
