# cbindgen configuration for tokenizers-ffi

language = "C"
include_guard = "TOKENIZERS_FFI_H"
autogen_warning = "/* Warning: This file is auto-generated by cbindgen. Do not modify manually. */"
cpp_compat = true

[parse]
parse_deps = false

[export]
prefix = ""
include = []
exclude = []

[fn]
rename_args = "None"

[struct]
rename_fields = "None"

[enum]
rename_variants = "None"
