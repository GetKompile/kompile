# Keras Model Importer Application Properties
spring.application.name=keras-model-importer
server.port=8083

# Logging configuration
logging.level.ai.kompile.model.importer.keras=INFO
logging.level.org.eclipse.deeplearning4j=WARN
logging.level.org.bytedeco=WARN
logging.level.org.deeplearning4j=WARN

# Multipart file configuration
spring.servlet.multipart.max-file-size=500MB
spring.servlet.multipart.max-request-size=500MB

# Actuator endpoints
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized

# Application info
info.app.name=Keras Model Importer
info.app.description=REST API and CLI tool for importing Keras models to DL4J format
info.app.version=1.0.0
